name: "Home Assistant"
type: "sw.application"
version: 2026.4.5
description: "Smart home services running on balena."
post-provisioning: >-
  ## Usage instructions

  Once your device joins the fleet you'll need to allow some time for it to download the various services.

  When it's done you should be able to access the app at http://homeassistant.local.
assets:
  repository:
    type: "blob.asset"
    data:
      url: "https://github.com/PierrickGT/balena-homeassistant.git"
  logo:
    type: "blob.asset"
    data:
      url: "https://raw.githubusercontent.com/klutchell/balena-homeassistant/main/logo.png"
data:
  defaultDeviceType: "raspberrypi4-64"
  supportedDeviceTypes:
    - "genericx86-64-ext"
    - "intel-nuc"
    - "raspberrypi3-64"
    - "raspberrypi4-64"
